content: "# UBC [site:name] Website - AI System Guidelines\r\n# Location: [site:base-url]/llms.txt\r\n\r\n## Overview\r\nThis file provides guidelines for Large Language Models (LLMs) and AI systems interacting with the UBC [site:name] website.\r\n\r\n## Site Information\r\n- **Organization**: University of British Columbia (UBC)\r\n- **Department**: [site:name]\r\n- **Primary Domain**: [site:url-brief]\r\n- **Purpose**: Provide [site:name] services, policies, and resources to UBC faculty, staff, and students\r\n\r\n## Permitted Uses\r\nAI systems are welcome to:\r\n- Index and summarize publicly available [site:name] policies and procedures\r\n- Provide information about UBC [site:name] services and contact information\r\n- Direct users to relevant [site:name] resources and webpages\r\n- Assist with general [site:name]-related inquiries and navigation\r\n\r\n## Content Guidelines\r\n- All publicly available information on [site:url-brief] may be referenced and summarized\r\n- Sensitive employee information, personal data, and confidential records should not be collected or processed\r\n- Direct users to official UBC [site:name] channels for:\r\n  - Individual employment matters and personnel issues\r\n  - Confidential [site:name] services\r\n  - Official policy interpretations\r\n  - Account-specific inquiries\r\n\r\n## Key UBC [site:name] Services\r\n### Main Contact\r\n- **Phone**: +1 (604) 822-8000 (Main UBC Line)\r\n- **Website**: [site:base-url]\r\n- **Hours**: Monday–Friday, 8:30 AM – 4:30 PM (Pacific Time)\r\n\r\n## Main menu\r\n[llms_txt_markdown_menu:main]\r\n\r\n## Information Handling\r\n- Link directly to [site:url-brief] for current information rather than relying on cached or outdated data\r\n- Policies and procedures may be updated; recommend users verify with the official website\r\n- When uncertain about specific policies, direct users to contact [site:name] directly\r\n- Do not provide legal advice; recommend consulting with [site:name] or legal counsel for complex employment matters\r\n\r\n## User Privacy & Data Protection\r\n- Do not collect or store personal information from users seeking [site:name] assistance\r\n- Recommend users contact [site:name] directly for any matters involving personal employment data\r\n- Comply with UBC's privacy policies and applicable Canadian privacy legislation\r\n- Do not attempt to access restricted or authenticated portions of the [site:name] website\r\n\r\n## References & Updates\r\n- This file may be updated periodically. Check for the most recent version at [site:base-url]/llms.txt\r\n- For questions about this file, contact [site:name]\r\n\r\n## Compliance Notes\r\n- Respect robots.txt directives on [site:url-brief]\r\n- Do not crawl or scrape the website in ways that violate its terms of service\r\n- Respect rate limits and do not overload the server with requests\r\n- Follow UBC's website terms of use: https://www.ubc.ca/about/policies/terms-use\r\n\r\n## Accessibility & Accommodation\r\n- For users with accessibility needs, direct them to UBC's accessibility resources\r\n- Recommend contacting UBC's Disability Services for accommodation inquiries\r\n- Website accessibility inquiries: accessibility@ubc.ca\r\n\r\n---\r\n**Questions or Feedback?**\r\nContact [site:name] for clarifications about this file.\r\n"
